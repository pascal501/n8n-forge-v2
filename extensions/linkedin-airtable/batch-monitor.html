<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Batch Enrichissement LinkedIn → Airtable</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 16px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
    .container {
      max-width: 700px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      padding: 24px;
    }
    h1 {
      margin: 0 0 24px 0;
      font-size: 20px;
      color: #333;
    }
    .progress-section {
      margin-bottom: 24px;
    }
    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: #666;
      margin-bottom: 8px;
    }
    #batch-bar {
      width: 100%;
      height: 24px;
      background: #e8e8e8;
      border-radius: 12px;
      overflow: hidden;
    }
    #batch-bar::after {
      content: '';
      display: block;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
      transition: width 0.3s ease;
    }
    #batch-counter {
      font-weight: 600;
      color: #333;
    }
    .stats-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin: 20px 0;
      padding: 12px;
      background: #f5f5f5;
      border-radius: 8px;
    }
    .stat {
      text-align: center;
    }
    .stat-label {
      font-size: 12px;
      color: #999;
      margin-bottom: 4px;
    }
    .stat-value {
      font-size: 20px;
      font-weight: 700;
      color: #333;
    }
    .stat-value.ok { color: #27ae60; }
    .stat-value.fail { color: #e74c3c; }
    #batch-current {
      font-size: 13px;
      color: #667eea;
      font-weight: 500;
      margin: 16px 0;
      padding: 8px;
      background: #f0f4ff;
      border-left: 3px solid #667eea;
      border-radius: 4px;
      min-height: 20px;
    }
    #batch-logs {
      background: #1e1e1e;
      color: #d4d4d4;
      font-family: 'Monaco', 'Courier New', monospace;
      font-size: 11px;
      padding: 12px;
      border-radius: 8px;
      max-height: 300px;
      overflow-y: auto;
      line-height: 1.4;
      margin: 16px 0;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .logs-label {
      font-size: 12px;
      color: #999;
      margin-bottom: 8px;
    }
    .button-group {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }
    button {
      flex: 1;
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    #btn-batch-stop {
      background: #e74c3c;
      color: white;
    }
    #btn-batch-stop:hover {
      background: #c0392b;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(231, 76, 60, 0.3);
    }
    #btn-batch-stop:disabled {
      background: #bdc3c7;
      cursor: not-allowed;
      transform: none;
    }
    .status-idle { color: #999; }
    .status-running { color: #27ae60; font-weight: 600; }
    .status-complete { color: #27ae60; font-weight: 600; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔄 Enrichissement Batch — LinkedIn → Airtable</h1>

    <div class="progress-section">
      <div class="progress-label">
        <span>Progression</span>
        <span id="batch-counter">—</span>
      </div>
      <div id="batch-bar"></div>
    </div>

    <div class="stats-section">
      <div class="stat">
        <div class="stat-label">Réussi(s)</div>
        <div class="stat-value ok" id="batch-ok">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Échec(s)</div>
        <div class="stat-value fail" id="batch-fail">0</div>
      </div>
    </div>

    <div id="batch-current"></div>

    <div>
      <div class="logs-label">📋 Logs en direct :</div>
      <div id="batch-logs">En attente de démarrage…</div>
    </div>

    <div class="button-group">
      <button id="btn-batch-stop">⏹️ Arrêter</button>
    </div>
  </div>

  <script src="batch-monitor.js"></script>
</body>
</html>
