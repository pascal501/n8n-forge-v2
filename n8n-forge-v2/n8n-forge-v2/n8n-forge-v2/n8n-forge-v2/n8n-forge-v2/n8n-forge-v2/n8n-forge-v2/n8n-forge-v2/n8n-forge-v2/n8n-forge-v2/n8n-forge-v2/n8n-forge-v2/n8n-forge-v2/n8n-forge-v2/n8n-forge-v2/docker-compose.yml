services:
  n8n-forge:
    build: .
    container_name: n8n-forge
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - forge-sessions:/app/data/sessions
    environment:
      PORT:            "3001"
      MCP_BASE_URL:    ${MCP_BASE_URL:-http://host.docker.internal:3000}
      MCP_AUTH_TOKEN:  ${MCP_AUTH_TOKEN}
      N8N_PUBLIC_URL:  ${N8N_PUBLIC_URL:-https://usine.dinaou.com}
      GEMINI_API_KEY:  ${GEMINI_API_KEY}
      GEMINI_MODEL:    ${GEMINI_MODEL:-gemini-2.5-flash-preview-04-17}
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  forge-sessions:
